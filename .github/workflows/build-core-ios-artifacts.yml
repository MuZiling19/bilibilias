name: Build Core iOS Artifacts

on:
  workflow_dispatch:
  push:
    branches: [kmp]
    paths:
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "build-logic/**"
      - "core/common/**"
      - "core/data/**"
      - "core/database/**"
      - "core/datastore/**"
      - "core/datastore-proto/**"
      - "core/network/**"
      - ".github/workflows/build-core-ios-artifacts.yml"
  pull_request:
    branches: [kmp]
    paths:
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle/**"
      - "build-logic/**"
      - "core/common/**"
      - "core/data/**"
      - "core/database/**"
      - "core/datastore/**"
      - "core/datastore-proto/**"
      - "core/network/**"
      - ".github/workflows/build-core-ios-artifacts.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios-core-artifacts:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Collect Core iOS Artifacts
        run: ./gradlew collectCoreIosArtifacts --stacktrace --info

      - name: Upload Core iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-ios-artifacts
          path: core/build/ios-artifacts
          if-no-files-found: error
